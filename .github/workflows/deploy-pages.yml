# Deploy this folder to GitHub Pages (use this repo = site root; path is ".")
# Repo settings → Pages → Build: GitHub Actions (first push may require approval).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect site (exclude .github from published files)
        run: |
          mkdir -p out
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='out/' \
            --exclude='README.md' \
            --exclude='README.MD' \
            ./ out/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
